{% extends "base.html" %}

{% set active_nav = 'thoughts' %}

{% block title %}Thoughts | {{ SITENAME }}{% endblock %}

{% block content %}

{% for thought in thoughts|reverse %}
<div class="thought">
  <a href="{{ SITEURL }}/{{ thought.override_url }}" class="thought__bar"></a>
  <div class="thought-meta">
    <a href="{{ SITEURL }}/{{ thought.override_url }}">{{ thought.date.strftime('%B %d, %Y') }}</a>
  </div>
  {{ thought.content }}
</div>
{% endfor %}
{% endblock %}
