{% extends "base.html" %}

{% set active_nav = 'articles' %}

{% block title %}Articles | {{ SITENAME }}{% endblock %}

{% block content %}
<div class="posts">
  {% for article in articles %}
  <div class="post">
    <span class="date">{{ article.date.strftime('%B %Y') }}</span>
    <a class="title" href="{{ SITEURL }}/{{ article.url }}">{{ article.title }}</a>
  </div>
  {% endfor %}
</div>
{% endblock %}
