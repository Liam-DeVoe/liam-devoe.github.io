<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  {% assets filters="libsass", output="css/theme.css", "css/theme.scss" %}
  <link rel="stylesheet" href="{{ SITEURL }}/{{ ASSET_URL }}">
  {% endassets %}
  <title>{% block title %}{{ SITENAME }}{% endblock %}</title>
  <script>
    MathJax = {
      tex: {
        inlineMath: [
          ['\\(', '\\)'], ['$', '$']
        ],
        displayMath: [
          ['\\[', '\\]'], ['$$', '$$']
        ]
      }
    }
  </script>
  <script async type="text/javascript" src="{{ SITEURL }}/theme/js/mathjax/tex-chtml.js"></script>
</head>

<body>
  <div class="container">
    <div class="site-header">
      <div class="name"><a href="{{ SITEURL }}/">{{ SITENAME }}</a></div>
      <nav>
        <a href="{{ SITEURL }}/articles/"{% if active_nav == 'articles' %} class="active"{% endif %}>Articles</a>
        <a href="{{ SITEURL }}/thoughts/"{% if active_nav == 'thoughts' %} class="active"{% endif %}>Thoughts</a>
        <a href="{{ SITEURL }}/chat/"{% if active_nav == 'chat' %} class="active"{% endif %}>Chat</a>
        <a href="{{ SITEURL }}/about/"{% if active_nav == 'about' %} class="active"{% endif %}>About</a>
      </nav>
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
